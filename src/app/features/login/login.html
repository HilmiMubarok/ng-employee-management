<div class="login-container">
    <div class="login-card">
        <h2>Login Backoffice</h2>

        <div *ngIf="errorMessage" class="error-alert">
            {{ errorMessage }}
        </div>

        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">

            <div class="form-group">
                <label for="username">Username</label>
                <input id="username" type="text" formControlName="username" placeholder="Masukkan username (admin)">
                <small class="error-text"
                    *ngIf="loginForm.get('username')?.invalid && loginForm.get('username')?.touched">
                    Username wajib diisi.
                </small>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input id="password" type="password" formControlName="password"
                    placeholder="Masukkan password (admin123)">
                <small class="error-text"
                    *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
                    Password wajib diisi.
                </small>
            </div>

            <button type="submit" [disabled]="loginForm.invalid">Login</button>
        </form>
    </div>
</div>
